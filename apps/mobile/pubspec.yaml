name: padel
description: "App de pádel (estilo DUPR) — Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado (PRD §9.3 — Riverpod recomendado)
  flutter_riverpod: ^2.6.1

  # Navegación
  go_router: ^14.6.2

  # Red (Dio + interceptores auth/retry/401→refresh)
  dio: ^5.7.0

  # Backend gestionado (auth, storage, realtime)
  supabase_flutter: ^2.8.0

  # Almacenamiento seguro de tokens
  flutter_secure_storage: ^9.2.2

  # i18n
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
