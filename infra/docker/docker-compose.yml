# Infra local de desarrollo: Postgres + Redis.
# Postgres respalda el backend NestJS (Prisma) cuando no se usa la BD de Supabase.
# Redis respalda las colas BullMQ (cálculo de rating, notificaciones).
services:
  postgres:
    image: postgres:16-alpine
    container_name: padel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
      POSTGRES_DB: padel
    ports:
      - "5432:5432"
    volumes:
      - padel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: padel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - padel_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  padel_pgdata:
  padel_redisdata:
